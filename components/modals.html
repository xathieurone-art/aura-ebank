<!DOCTYPE html>
<html lang="en">
<div id="edit-modal" class="modal-overlay hidden">
    <div class="glass-card modal-content">
        <div class="modal-header">
            <h3><i class="fas fa-user-edit"></i> Edit Identity</h3>
        </div>
        <form onsubmit="saveUserEdit(event)" class="auth-form mt-4">
            <input type="hidden" id="edit-user-id">
            <div class="input-row">
                <div class="input-group"><i class="fas fa-user"></i><input type="text" id="edit-fname" required placeholder="First Name"></div>
                <div class="input-group"><i class="fas fa-fingerprint"></i><input type="text" id="edit-mname" placeholder="Middle Name"></div>
            </div>
            <div class="input-row">
                <div class="input-group"><i class="fas fa-id-card"></i><input type="text" id="edit-lname" required placeholder="Last Name"></div>
                <div class="input-group">
                    <i class="fas fa-tag"></i>
                    <select id="edit-suffix">
                        <option value="">No Suffix</option>
                        <option value="Jr.">Jr.</option>
                        <option value="Sr.">Sr.</option>
                        <option value="III">III</option>
                    </select>
                </div>
            </div>
            <div class="input-row">
                <div class="input-group">
                    <i class="fas fa-venus-mars"></i>
                    <select id="edit-gender">
                        <option value="">Select Gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="input-group"><i class="fas fa-envelope"></i><input type="email" id="edit-email" required placeholder="Email Address"></div>
            </div>
            <div class="input-group"><i class="fas fa-phone"></i><input type="text" id="edit-phone" placeholder="Phone Number" maxlength="11"></div>
            <div class="modal-actions mt-4">
                <button type="button" class="btn btn-cancel" onclick="closeEditModal()">CANCEL</button>
                <button type="submit" class="btn btn-save">SAVE CHANGES</button>
            </div>
        </form>
    </div>
</div>
</html>
