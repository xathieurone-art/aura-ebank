<!DOCTYPE html>
<html lang="en">
<template id="tpl-client-dashboard">
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="brand">AURA E-BANK</div>
            <div class="user-profile">
                <i class="fas fa-user-circle"></i>
                <p id="display-name">User Name</p>
                <small id="display-acc">ACC: ####-####</small>
            </div>
            <ul class="nav-links">
                <li id="tab-wallet" class="active" onclick="switchTab('wallet')"><i class="fas fa-wallet"></i> <span>Wallet</span></li>
                <li id="tab-history" onclick="switchTab('history')"><i class="fas fa-history"></i> <span>History</span></li>
                <li id="tab-loan" onclick="switchTab('loan')"><i class="fas fa-hand-holding-usd"></i> <span>Loan</span></li>
                <li id="tab-bills" onclick="switchTab('bills')"><i class="fas fa-file-invoice-dollar"></i> <span>Bill Payments</span></li>
                <li id="tab-settings" onclick="switchTab('settings')"><i class="fas fa-cog"></i> <span>Settings</span></li>
            </ul>
            <button class="btn btn-danger btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> <span>Logout</span></button>
        </aside>

        <main class="content">
            <section id="sec-wallet">
                <div class="glass-card balance-card">
                    <small>Available Balance</small>
                    <h1 id="display-balance">₱0.00</h1>
                    <span class="currency-tag">PHP - Philippine Peso</span>
                </div>

                <div class="action-grid">
                    <div class="glass-card">
                        <h3><i class="fas fa-arrow-down" style="color: var(--success);"></i> Deposit</h3>
                        <form onsubmit="handleTransaction(event, 'deposit')" class="auth-form">
                            <div class="input-group">
                                <i class="fas fa-money-bill-wave"></i>
                                <input type="number" placeholder="Amount" step="0.01" required>
                            </div>
                            <button type="submit" class="btn btn-primary btn-block">Add Funds</button>
                        </form>
                    </div>
                    <div class="glass-card">
                        <h3><i class="fas fa-arrow-up" style="color: var(--danger);"></i> Withdraw</h3>
                        <form onsubmit="handleTransaction(event, 'withdraw')" class="auth-form">
                            <div class="input-group">
                                <i class="fas fa-hand-holding-usd"></i>
                                <input type="number" placeholder="Amount" step="0.01" required>
                            </div>
                            <button type="submit" class="btn btn-danger btn-block">Get Cash</button>
                        </form>
                    </div>
                </div>
                
                <div class="glass-card mt-4">
                    <h3><i class="fas fa-paper-plane"></i> Send Money</h3>
                    <form id="transfer-form" class="transfer-form">
                        <div class="input-group">
                            <i class="fas fa-id-card"></i>
                            <input type="text" name="target_acc" placeholder="Receiver Account Number" required>
                        </div>
                        <div class="input-group">
                            <i class="fas fa-coins"></i>
                            <input type="number" name="amount" placeholder="Amount (PHP)" step="0.01" required>
                        </div>
                        <div class="input-group">
                            <i class="fas fa-comment-alt"></i>
                            <input type="text" name="description" placeholder="Notes (Optional)">
                        </div>
                        <button type="submit" class="btn btn-primary btn-block">Transfer Funds</button>
                    </form>
                </div>
            </section>

            <section id="sec-history" class="hidden">
                <div class="glass-card full-width">
                    <h3>Transaction History</h3>
                    <div class="input-group search-box" style="max-width: 1500px; margin-bottom: 15px;">
                        <i class="fas fa-search"></i>
                        <input type="text" id="history-search" placeholder="Search by Ref # or Description..." onkeyup="filterHistory()">
                    </div>
                    <div class="table-responsive">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Ref #</th>
                                    <th>Description</th>
                                    <th>Amount</th>
                                </tr>
                            </thead>
                            <tbody id="user-trans-list"></tbody>
                        </table>
                    </div>
                </div>
            </section>

            <section id="sec-loan" class="hidden">
                <div class="glass-card full-width">
                    <h3><i class="fas fa-file-invoice"></i> Loan Application</h3>
                    <form onsubmit="handleLoanApplication(event)" class="auth-form" style="max-width: 600px;">
                        <div class="input-group">
                            <i class="fas fa-university"></i>
                            <select id="loan-type" required>
                                <option value="" disabled selected>Select Loan Type</option>
                                <option value="Personal">Personal Loan</option>
                                <option value="Home">Home Loan</option>
                                <option value="Car">Car Loan</option>
                                <option value="Business">Business Loan</option>
                                <option value="Education">Education Loan</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <i class="fas fa-coins"></i>
                            <input type="number" id="loan-amount" placeholder="Desired Amount (PHP)" step="0.01" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-block">Submit Loan Application</button>
                    </form>
                </div>

                <div class="glass-card mt-4 full-width">
                    <h3>My Loan Applications</h3>
                    <div class="table-responsive">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Loan Type</th>
                                    <th>Amount</th>
                                    <th>Date Applied</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="user-loan-list"></tbody>
                        </table>
                    </div>
                </div>
            </section>

            <section id="sec-bills" class="hidden">
                <div class="glass-card full-width">
                    <h3><i class="fas fa-file-invoice-dollar"></i> Pay a Bill</h3>
                    <form onsubmit="handleBillPayment(event)" class="auth-form" style="max-width: 600px;">
                        <div class="input-group">
                            <i class="fas fa-building"></i>
                            <select id="biller-type" required>
                                <option value="" disabled selected>Select Biller</option>
                                <option value="Penelco">Penelco (Electricity)</option>
                                <option value="Aqua Wate">Aqua Water</option>
                                <option value="Spring Water">Spring Water</option>
                                <option value="PLDC">PLDC (Internet)</option>
                                <option value="Globe">Globe (Internet/Mobile)</option>
                                <option value="Smart">Smart (Mobile)</option>
                                <option value="BDO">BDO Credit Card</option>
                                <option value="BPI">BPI Credit Card</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <i class="fas fa-coins"></i>
                            <input type="number" id="bill-amount" placeholder="Amount (PHP)" step="0.01" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-block">Pay Bill</button>
                    </form>
                </div>

                <div class="glass-card mt-4 full-width">
                    <h3>Bill Payment History</h3>
                    <div class="table-responsive">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Biller</th>
                                    <th>Amount</th>
                                    <th>Date Paid</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="user-bills-list"></tbody>
                        </table>
                    </div>
                </div>
            </section>

            <section id="sec-settings" class="hidden">
                <div class="glass-card">
                    <h3><i class="fas fa-user-shield"></i> Account Settings</h3>
                    <form onsubmit="handleSelfUpdate(event)" class="auth-form">
                        <div class="input-group">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="self-email" name="email" placeholder="Email Address" required>
                        </div>
                        <div class="input-group">
                            <i class="fas fa-phone"></i>
                            <input type="text" id="self-phone" name="phone" placeholder="Phone Number" maxlength="11">
                        </div>
                        <div class="input-group">
                            <i class="fas fa-key"></i>
                            <input type="password" id="self-pass" name="password" placeholder="New Password (Leave blank to keep)">
                            <i class="fas fa-eye toggle-password" onclick="togglePassword('self-pass', this)"></i>
                        </div>
                        <button type="submit" class="btn btn-primary btn-block">Update Profile</button>
                    </form>
                </div>
            </section>
        </main>
    </div>
</template>
</html>
